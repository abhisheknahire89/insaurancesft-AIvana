<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insurance Pre-Auth Module</title>
  <!-- Google Fonts: Lora and Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.tailwindcss.com/3.4.1?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Brand primary and hover
            'opd-primary': '#187A6B',
            'opd-primary-dark': '#156357',
            'opd-accent': '#187A6B',
            'primary-tint': '#E6F2EF',
            // Neutral colors for premium SaaS
            'opd-bg': '#F1F7F6',
            'opd-surface': '#FFFFFF',
            'opd-border': '#E1E7E6',
            'opd-input-bg': '#F4F8F7',
            'opd-text-primary': '#1A1D23',
            'opd-text-secondary': '#4A5554',
            'opd-text-muted': '#808C8B',
            // Status and alerts
            'opd-success': '#2F9E67',
            'opd-error': '#D64545',
            // Fallbacks to map old Veda styles
            'veda-purple': '#187A6B',
            'aivana-accent': '#187A6B',
            'aivana-dark': '#FFFFFF',
            'aivana-grey': '#F4F8F7',
            'aivana-light-grey': '#E1E7E6',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Lora', 'Georgia', 'serif'],
          },
          boxShadow: {
            'card': '0 1px 3px rgba(24,122,107,0.05), 0 1px 2px rgba(0,0,0,0.02)',
            'float': '0 8px 30px rgba(24,122,107,0.08)',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            waveform: {
              '0%, 100%': { height: '20%' },
              '50%': { height: '100%' },
            }
          },
          animation: {
            fadeInUp: 'fadeInUp 0.4s ease-out forwards',
            waveform: 'waveform 1s ease-in-out infinite',
          }
        },
      },
    };
  </script>
  <style>
    /* Premium UI Utility Primitives */
    .font-lora {
      font-family: 'Lora', Georgia, serif;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.625rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: #FFFFFF;
      background-color: #187A6B;
      border-radius: 0.75rem;
      border: 1px solid transparent;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }
    .btn-primary:hover:not(:disabled) {
      background-color: #156357;
    }
    .btn-primary:disabled {
      background-color: #E1E7E6;
      color: #808C8B;
      cursor: not-allowed;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.625rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #187A6B;
      background-color: #FFFFFF;
      border: 1px solid #187A6B;
      border-radius: 0.75rem;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }
    .btn-secondary:hover:not(:disabled) {
      background-color: #E6F2EF;
    }
    .btn-secondary:disabled {
      border-color: #E1E7E6;
      color: #808C8B;
      cursor: not-allowed;
    }

    .form-label {
      display: block;
      font-family: 'Lora', Georgia, serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: #1A1D23;
      margin-bottom: 0.375rem;
    }

    .form-input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background-color: #F4F8F7;
      border: 1px solid #E1E7E6;
      border-radius: 0.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: #1A1D23;
      outline: none;
      transition: all 0.15s ease-in-out;
    }
    .form-input:focus {
      background-color: #FFFFFF;
      border-color: #187A6B;
      box-shadow: 0 0 0 2px rgba(24, 122, 107, 0.15);
    }
    .form-input::placeholder {
      color: #808C8B;
    }

    .card-premium {
      background-color: #FFFFFF;
      border: 1px solid #E1E7E6;
      border-radius: 1rem;
      box-shadow: 0 1px 3px rgba(24,122,107,0.02), 0 1px 2px rgba(0,0,0,0.01);
      padding: 1.5rem;
      transition: box-shadow 0.2s ease-in-out;
    }
    .card-premium:hover {
      box-shadow: 0 4px 20px rgba(24,122,107,0.06);
    }

    .table-premium {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.875rem;
    }
    .table-premium th {
      font-family: 'Lora', Georgia, serif;
      background-color: #F4F8F7;
      color: #4A5554;
      font-weight: 600;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #E1E7E6;
    }
    .table-premium td {
      padding: 1rem;
      border-bottom: 1px solid #E1E7E6;
      color: #1A1D23;
    }
    .table-premium tr:hover td {
      background-color: #F9FAFA;
    }

    /* Professional Clinical Print Engine */
    @media print {
      body {
        background: white !important;
        color: black !important;
        margin: 0 !important;
        padding: 0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        visibility: hidden !important;
      }

      * {
        overflow: visible !important;
      }

      /* Use .no-print to hide UI elements during export */
      .no-print {
        display: none !important;
        visibility: hidden !important;
      }

      /* Show only the printable document */
      .printable-area {
        display: block !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        visibility: visible !important;
        z-index: 99999 !important;
      }

      .printable-area,
      .printable-area * {
        visibility: visible !important;
        color: black !important;
        print-color-adjust: exact !important;
        -webkit-print-color-adjust: exact !important;
      }

      @page {
        size: A4;
        margin: 10mm;
      }
    }

    .printable-area {
      display: none;
    }

    /* ── Design System Utilities ─────────────────────────────────── */

    /* Consistent section heading style (lighter than step title) */
    .section-label {
      font-size: 0.6875rem;   /* 11px */
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgb(156 163 175); /* gray-400 */
    }

    /* Inline badge that flags AI-suggested content */
    .ai-suggestion-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgb(96 165 250);  /* blue-400 */
      background: rgba(59 130 246 / 0.10);
      border: 1px solid rgba(59 130 246 / 0.22);
      border-radius: 9999px;
      padding: 1px 7px;
    }

    /* Pulsing loading indicator dots */
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.2; transform: scale(0.85); }
      50%       { opacity: 1;   transform: scale(1); }
    }
    .pulse-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
    .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
    .pulse-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Inline SVG spinner (no emoji) */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-svg { animation: spin 0.8s linear infinite; }

    /* ── Scrollbar ─────────────────────────────────────────────────── */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #505050;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.19.0"
  }
}
</script>
</head>

<body class="bg-opd-bg text-opd-text-primary antialiased font-sans">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
